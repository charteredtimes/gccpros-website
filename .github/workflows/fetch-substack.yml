name: Fetch Substack RSS

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Substack RSS and save as JSON
        run: |
          curl -s -L \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36" \
            -H "Accept: application/rss+xml, application/xml, text/xml, */*" \
            "https://shammip.substack.com/feed" \
            -o feed.xml
          echo "Feed size: $(wc -c < feed.xml) bytes"
          python3 << 'PYEOF'
          import json, xml.etree.ElementTree as ET, re, datetime

          with open('feed.xml', 'r', encoding='utf-8') as f:
              xml_data = f.read()

          root = ET.fromstring(xml_data)
          ns = {'media': 'http://search.yahoo.com/mrss/'}
          items = []

          for item in root.findall('.//item'):
              def t(tag):
                  el = item.find(tag)
                  return el.text.strip() if el is not None and el.text else ''

              thumb = ''
              enc = item.find('enclosure')
              if enc is not None:
                  thumb = enc.get('url', '')
              media = item.find('media:content', ns)
              if not thumb and media is not None:
                  thumb = media.get('url', '')

              desc = t('description')
              desc_clean = re.sub('<[^>]+>', '', desc).strip()[:300]

              items.append({
                  'title':   t('title'),
                  'link':    t('link'),
                  'date':    t('pubDate'),
                  'summary': desc_clean,
                  'thumb':   thumb,
              })

          out = json.dumps({
              'articles': items,
              'updated': datetime.datetime.utcnow().isoformat()
          }, indent=2, ensure_ascii=False)

          with open('substack.json', 'w') as f:
              f.write(out)

          print(f"Saved {len(items)} articles:")
          for a in items:
              print(f"  - {a['title']}")
          PYEOF

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add substack.json
          git diff --staged --quiet || git commit -m "Auto: update Substack feed [skip ci]"
          git push
