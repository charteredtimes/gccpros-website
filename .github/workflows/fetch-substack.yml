name: Fetch Substack RSS

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch Substack RSS and save as JSON
        run: |
          python3 << 'PYEOF'
          import json, re, datetime, subprocess

          SUBSTACK_URL = 'https://shammip.substack.com'
          api_url = f'{SUBSTACK_URL}/api/v1/posts/?limit=20&offset=0'

          result = subprocess.run([
              'curl', '-s', '-L',
              '-H', 'User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
              '-H', 'Accept: application/json',
              '-H', 'Referer: https://substack.com',
              api_url
          ], capture_output=True, text=True, timeout=30)

          print(f"API response: {result.stdout[:200]}")

          try:
              posts = json.loads(result.stdout)
          except json.JSONDecodeError:
              print("API failed, using known articles fallback")
              posts = [
                  {
                      'title': 'Transforming GCCs: The 5 Essential Shifts',
                      'canonical_url': 'https://shammip.substack.com/p/transforming-gccs-the-5-essential',
                      'post_date': '2026-03-22T00:00:00.000Z',
                      'subtitle': 'The GCC model is evolving fast. The organisations winning in this space are fundamentally rethinking what a GCC is for, who leads it, and how it creates value.',
                      'cover_image': ''
                  },
                  {
                      'title': 'What Really Fails a GCC?',
                      'canonical_url': 'https://shammip.substack.com/p/what-really-fails-a-gcc',
                      'post_date': '2026-03-22T00:00:00.000Z',
                      'subtitle': 'Not cost. Not talent. Not location. The real story is far more uncomfortable. Many GCCs stall or become irrelevant within just a few years.',
                      'cover_image': 'https://raw.githubusercontent.com/charteredtimes/gccpros-website/main/Images/Why%20GCCs%20fail.png'
                  }
              ]

          articles = []
          if isinstance(posts, list):
              for p in posts:
                  articles.append({
                      'title':   p.get('title', ''),
                      'link':    p.get('canonical_url', p.get('link', '')),
                      'date':    p.get('post_date', p.get('pubDate', '')),
                      'summary': p.get('subtitle', p.get('summary', ''))[:300],
                      'thumb':   p.get('cover_image', '') or '',
                  })

          out = json.dumps({
              'articles': articles,
              'updated': datetime.datetime.utcnow().isoformat()
          }, indent=2, ensure_ascii=False)

          with open('substack.json', 'w') as f:
              f.write(out)

          print(f"Saved {len(articles)} articles to substack.json")
          for a in articles:
              print(f"  - {a['title']}")
          PYEOF

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add substack.json
          git diff --staged --quiet || git commit -m "Auto: update Substack feed [skip ci]"
          git push
