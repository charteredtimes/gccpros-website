name: Fetch Substack RSS

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:        # manual trigger button in GitHub

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Substack RSS and save as JSON
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, xml.etree.ElementTree as ET, os

          url = 'https://shammip.substack.com/feed'
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
          with urllib.request.urlopen(req, timeout=15) as r:
              xml_data = r.read()

          root = ET.fromstring(xml_data)
          ns = {'media': 'http://search.yahoo.com/mrss/'}
          items = []

          for item in root.findall('.//item'):
              def t(tag):
                  el = item.find(tag)
                  return el.text.strip() if el is not None and el.text else ''

              thumb = ''
              enc = item.find('enclosure')
              if enc is not None:
                  thumb = enc.get('url','')
              media = item.find('media:content', ns)
              if not thumb and media is not None:
                  thumb = media.get('url','')

              items.append({
                  'title':   t('title'),
                  'link':    t('link'),
                  'date':    t('pubDate'),
                  'summary': t('description')[:300] if t('description') else '',
                  'thumb':   thumb,
              })

          out = json.dumps({'articles': items, 'updated': __import__('datetime').datetime.utcnow().isoformat()}, indent=2)
          with open('substack.json','w') as f:
              f.write(out)
          print(f"Saved {len(items)} articles to substack.json")
          PYEOF

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add substack.json
          git diff --staged --quiet || git commit -m "Auto: update Substack feed"
          git push
