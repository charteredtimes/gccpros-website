<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GCC Insiders Community — Apply</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ink:#0A1628;--gold:#C9973A;--gold-light:#F0C87A;--blue:#1A3A6B;--blue-mid:#2356A4;--blue-light:#EBF1FB;--cream:#FAF7F2;--white:#fff;--muted:#6B7A99;--border:rgba(26,58,107,0.1);}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;}

nav{background:rgba(10,22,40,0.97);display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:64px;border-bottom:1px solid rgba(201,151,58,0.2);position:sticky;top:0;z-index:100;}
.nav-logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;color:#fff;text-decoration:none;}
.nav-logo span{color:var(--gold);}
.nav-back{font-size:13px;color:rgba(255,255,255,0.5);text-decoration:none;transition:color 0.2s;}
.nav-back:hover{color:#fff;}
@media(max-width:640px){nav{padding:0 20px;}.hamburger{display:flex!important;}.nav-links{display:none!important;}.mobile-menu.open{display:flex!important;}}

.hero{background:var(--ink);padding:64px 40px 48px;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(201,151,58,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(201,151,58,0.05) 1px,transparent 1px);background-size:56px 56px;}
.hero-inner{position:relative;z-index:2;max-width:600px;margin:0 auto;}
.badge{display:inline-flex;align-items:center;gap:8px;background:rgba(201,151,58,0.1);border:1px solid rgba(201,151,58,0.25);padding:6px 16px;border-radius:100px;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold-light);margin-bottom:20px;}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(28px,4vw,44px);font-weight:900;color:#fff;line-height:1.1;letter-spacing:-1px;margin-bottom:14px;}
.hero h1 em{font-style:italic;color:var(--gold);}
.hero-sub{font-size:15px;color:rgba(255,255,255,0.55);line-height:1.75;font-weight:300;max-width:520px;margin:0 auto 24px;}
.eligibility-chips{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.chip{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:100px;padding:5px 14px;font-size:12px;font-weight:500;color:rgba(255,255,255,0.6);}
.chip.green{background:rgba(34,197,94,0.08);border-color:rgba(34,197,94,0.2);color:#4ade80;}

.form-wrap{max-width:600px;margin:0 auto;padding:32px 20px 60px;}
.form-card{background:var(--white);border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(10,22,40,0.08);border:1px solid var(--border);}
.form-header{background:var(--ink);padding:20px 28px;display:flex;align-items:center;gap:12px;}
.form-header-icon{width:36px;height:36px;background:rgba(201,151,58,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;}
.form-header-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:#fff;}
.form-header-sub{font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px;}
.form-body{padding:28px;}
.section-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--blue-mid);border-bottom:2px solid var(--blue-light);padding-bottom:8px;margin:24px 0 18px;}
.section-label:first-child{margin-top:0;}
.fg{margin-bottom:18px;}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;}
.req{color:var(--gold);}
input,textarea{font-family: inherit;font-size: inherit;}
input[type="checkbox"],input[type="radio"]{cursor:pointer;width: 16px;cursor: pointer;}
input::placeholder{color: var(--muted);}
a,.nav-back{cursor: pointer;\overflow-wrap: break-word;}

.nowrap {podss+white-space: nowrap;}
